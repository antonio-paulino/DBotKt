services:
  dbotkt:
    container_name: DBotKT
    restart: always
    image: paulinoo/dbotkt:latest
    environment:
      - TZ=${TZ:-UTC} # Time zone for log timestamps (e.g. Europe/Lisbon)
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      - SPOTIFY_MARKET=${SPOTIFY_MARKET:-US} # Optional ISO country code for Spotify (default: US)
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - YT_REFRESH_TOKEN=${YT_REFRESH_TOKEN} # Optional: YouTube OAuth2 refresh token
      - PREFIXES=! . # Space-separated list of command prefixes
      - ADMIN_IDS=${ADMIN_IDS} # Comma-separated list of admin IDs
      - YTDLP_PATH=${YTDLP_PATH:-} # Optional: path to yt-dlp binary; if set, yt-dlp becomes the primary YouTube backend (image ships /usr/local/bin/yt-dlp)
      - YT_CIPHER=http://ejs-api:8001 # Optional: URL of the yt-cipher (ejs-api) service
      - YT_CIPHER_PASSWORD=${YT_CIPHER_PASSWORD} # Optional: password for the yt-cipher service
      - HEALTH_PORT=${HEALTH_PORT:-8080} # GET /health endpoint port ("off" to disable)
      - COMMAND_COOLDOWN_SECONDS=${COMMAND_COOLDOWN_SECONDS:-2} # Per-user per-command cooldown
      - GUILD_SETTINGS_FILE=/app/data/guild-settings.json # Per-guild settings store (persisted in the volume)
    ports:
      - "${HEALTH_PORT:-8080}:8080" # Publish the health endpoint for external monitoring
    volumes:
      - dbotkt-data:/app/data # Persists per-guild settings across restarts
    networks:
      - internal_network

  ejs-api:
    image: ghcr.io/kikkia/yt-cipher:master
    container_name: ejs_signature_api
    environment:
      - API_TOKEN=${YT_CIPHER_PASSWORD} # Password for accessing the API
    restart: unless-stopped
    networks:
      - internal_network

volumes:
  dbotkt-data:

networks:
  internal_network:
    driver: bridge
