# slf4j-simple configuration.
# Timestamps honour the JVM default time zone, which is set from the TZ environment
# variable on startup (see Bot.main). The trailing "z" prints the zone so log times are
# unambiguous across deployments (e.g. WEST, UTC).
org.slf4j.simpleLogger.showDateTime=true
org.slf4j.simpleLogger.dateTimeFormat=yyyy-MM-dd HH:mm:ss z
org.slf4j.simpleLogger.showThreadName=false
org.slf4j.simpleLogger.showShortLogName=true
org.slf4j.simpleLogger.levelInBrackets=true
org.slf4j.simpleLogger.defaultLogLevel=info
